<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Personal Scoreboard</title>
<link rel="stylesheet" href="scoreboard.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="card">

    <div class="card-header">
        <h3> Your Scoreboard</h3>
        <p id="playerName"> Name · Date </p>
    </div>

    <div class="row">
        <span>TODAY'S SCORE</span>
        <span id="todayScore" class="muted"> -- </span>
    </div>

    <div class="row">
        <span>TOTAL SCORE</span>
        <span id="totalScore" class="highlight"> -- </span>
    </div>

    <div class="row">
        <span>GAMES PLAYED</span>
        <span id="gamesPlayed" class="bold"> -- </span>
    </div>

    <div class="row">
        <span>WIN RATE</span>
        <span id="winRate" class="green"> -- </span>
    </div>

    <div class="row">
        <span>STREAK</span>
        <span id="streak" class="bold"> -- </span>
    </div>

    <div class="row">
        <span>BEST STREAK</span>
        <span id="bestStreak" class="bold"> -- </span>
    </div>

    <div class="rank">
        Your rank today
        <span id="rank"> -- </span>
    </div>

</div>

</body>
</html>
